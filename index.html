<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AiEdits Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background-color: #0a0b10; color: #00d4ff; display: flex; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden;">

  <div id="sidebar" style="width: 260px; background: #00d4ff; display: flex; flex-direction: column; padding: 15px; box-shadow: 2px 0 15px rgba(0, 212, 255, 0.3); z-index: 10;">
    <button id="newChatBtn" style="background: #000; color: #fff; border: 1px solid #000; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 20px; transition: 0.3s;">+ New Chat</button>
    <div id="chatList" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;"></div>
  </div>

  <div style="flex: 1; display: flex; justify-content: center; align-items: center; position: relative;">
    <div class="container">
      <h1 style="text-align: center; text-shadow: 0 0 10px #00d4ff; margin-top: 0; margin-bottom: 5px;">AiEdits Chat</h1>
      <p id="activeChatTitle" style="text-align: center; color: #888; margin-bottom: 15px; font-size: 14px;">No Name</p>
      
      <div id="chatLog"></div>

      <div class="input-area" style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
        <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off" />
        <input type="file" id="fileInput" style="display:none;" />
        <button type="button" id="uploadBtn" onclick="document.getElementById('fileInput').click()" class="custom-file-upload">Select File</button>
        <span id="fileStatus" style="font-size: 11px; color: #00d4ff; min-width: 100px;"></span>
        <button id="sendBtn">Send</button>
      </div>
    </div>

    <div id="renameModal" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #161b22; padding: 25px; border: 2px solid #00d4ff; border-radius: 15px; box-shadow: 0 0 30px #000; z-index: 100; text-align: center;">
      <h3 style="color: #00d4ff; margin-top: 0;">Rename Chat</h3>
      <input type="text" id="renameInput" style="background: #0d1117; border: 1px solid #00d4ff; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; width: 200px; outline: none;" />
      <div style="display: flex; gap: 10px; justify-content: center;">
        <button onclick="confirmRename()" style="background: #00d4ff; color: #000; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Save</button>
        <button onclick="closeRenameModal()" style="background: transparent; color: #00d4ff; border: 1px solid #00d4ff; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Cancel</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
