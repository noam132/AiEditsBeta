<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AiEdits Beta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar">
        <button id="newChatBtn" onclick="createNewChat()">+ New Chat</button>
        <div id="chatList"></div>
    </div>

    <div class="main-content">
        <div class="container">
            <h2 id="activeChatTitle" style="color:#00ffff; margin: 0 0 20px 0; font-size: 26px;">New Chat</h2>
            
            <div id="chatLog"></div>
            
            <div class="input-area">
                <input type="file" id="fileInput" style="display:none;" onchange="document.getElementById('fileStatus').innerText = this.files[0] ? this.files[0].name : ''">
                
                <button type="button" class="custom-file-upload" onclick="document.getElementById('fileInput').click()">Select File</button>
                
                <input type="text" id="messageInput" placeholder="Message Gemini...">
                
                <button id="sendBtn">Send</button>
            </div>
            
            <span id="fileStatus" style="font-size: 12px; color: #00ffff; margin-top: 8px; display: block; height: 14px; font-weight: bold;"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
