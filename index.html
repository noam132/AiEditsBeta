<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AiEdits Beta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <button id="newChatBtn" onclick="createNewChat()">+ New Chat</button>
        <div id="chatList"></div>
    </div>

    <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
        <div class="container">
            <h2 id="activeChatTitle" style="color:#00ffff; margin: 0 0 15px 0;">New Chat</h2>
            <div id="chatLog"></div>
            <div class="input-area">
                <input type="file" id="fileInput" style="display:none;" onchange="document.getElementById('fileStatus').innerText = this.files[0] ? this.files[0].name : ''">
                <button type="button" class="custom-file-upload" onclick="document.getElementById('fileInput').click()">Select File</button>
                <span id="fileStatus" style="font-size: 11px; color: #00ffff; max-width: 80px; overflow: hidden; text-overflow: ellipsis;"></span>
                
                <input type="text" id="messageInput" placeholder="Message Gemini...">
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
